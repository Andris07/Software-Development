<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://www.wienerlinien.at/o/wstw-next/images/wienerlinien/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vienna Tickets</title>
    <script type="module" src="/src/main.js" defer></script>
  </head>
  <body>
    <header class="p-10 bg-zinc-200 flex flex-col md:flex-row items-center gap-5">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/59/Wiener_Linien_logo.svg" class="w-60">
      <img src="https://upload.wikimedia.org/wikipedia/commons/9/95/Logo_VOR.svg" class="w-60">
    </header>
    <main class="m-2">
      <form class="p-3 mb-3 bg-red-400 flex justify-center items-center">
        <select name="type" id="type" class="bg-white px-2">
          <option value="paper">Paper</option>
          <option value="digital">Digital</option>
        </select>
      </form>
      <div id="tickets" class="flex gap-4 flex-wrap"></div>
    </main>
  </body>
</html>
